<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>RYZN</title>
    <meta name="description" content="RYZN is the fitness app with a patent-pending calorie engine that actually works. Real-time muscle maps. AI progression. Built for iPhone." />
    <meta name="author" content="Jack Steelberg" />

    <meta property="og:title" content="RYZN - Log Smarter. Lift Heavier." />
    <meta property="og:description" content="Patent-pending fitness app with a thermodynamic calorie engine validated against lab research." />
    <meta property="og:type" content="website" />
  </head>

  <body style="background-color: #08091a; color: #ffffff; min-height: 100vh;">
    <div id="root" style="min-height: 100vh;"></div>
    <script>
      // No-flash theme application — runs before the React bundle
      // loads so first paint already has the user's persisted accent
      // applied to --primary / --accent / --accent-green / --ring.
      // Matches the values in src/lib/themes.ts THEMES table.
      (function () {
        try {
          var THEMES = {
            emerald: '145 72% 50%',
            coral:   '10 78% 55%',
            ocean:   '210 64% 46%',
            blush:   '340 65% 57%',
            gold:    '45 75% 53%',
            violet:  '270 47% 52%'
          };
          var key = localStorage.getItem('ryzn-theme');
          if (key && THEMES[key]) {
            var v = THEMES[key];
            var s = document.documentElement.style;
            s.setProperty('--primary', v);
            s.setProperty('--accent', v);
            s.setProperty('--accent-green', v);
            s.setProperty('--ring', v);
          }
        } catch (_) {
          /* localStorage blocked / private mode — fall through to defaults */
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
